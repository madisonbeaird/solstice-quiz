<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Winter Solstice Quiz</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d3b 100%);
      min-height: 100vh;
      color: #e8e8ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 2.2rem;
      text-align: center;
      margin: 30px 0 10px;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      letter-spacing: 2px;
    }
    .subtitle { text-align: center; color: #aaaadd; margin-bottom: 30px; font-size: 1rem; }
    .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
    .star { position:absolute; background:white; border-radius:50%; animation:twinkle 3s infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .container { position:relative; z-index:1; width:100%; max-width:700px; }
    .card { background:rgba(255,255,255,0.05); border:1px solid rgba(255,215,0,0.2); border-radius:16px; padding:30px; margin-bottom:20px; backdrop-filter:blur(10px); }
    #join-section input { width:100%; padding:14px 18px; border-radius:10px; border:2px solid rgba(255,215,0,0.4); background:rgba(255,255,255,0.08); color:#fff; font-size:1.1rem; margin-bottom:14px; outline:none; transition:border-color 0.3s; }
    #join-section input:focus { border-color:#ffd700; }
    button { width:100%; padding:14px; border-radius:10px; border:none; background:linear-gradient(135deg,#ffd700,#ffaa00); color:#1a1a2e; font-size:1.1rem; font-weight:bold; cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; letter-spacing:1px; }
    button:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(255,215,0,0.4); }
    button:disabled { background:#555; color:#888; cursor:not-allowed; transform:none; box-shadow:none; }
    .question-number { font-size:0.85rem; color:#aaaadd; margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }
    .question-text { font-size:1.3rem; margin-bottom:24px; line-height:1.5; color:#ffd700; }
    .options { display:flex; flex-direction:column; gap:12px; }
    .option-btn { width:100%; padding:14px 18px; border-radius:10px; border:2px solid rgba(255,215,0,0.3); background:rgba(255,255,255,0.05); color:#e8e8ff; font-size:1rem; cursor:pointer; text-align:left; transition:all 0.2s; }
    .option-btn:hover:not(:disabled) { border-color:#ffd700; background:rgba(255,215,0,0.1); transform:translateX(4px); }
    .option-btn.correct { background:rgba(0,200,100,0.25); border-color:#00c864; color:#00ff80; }
    .option-btn.wrong { background:rgba(255,50,50,0.2); border-color:#ff3232; color:#ff8080; }
    .feedback { margin-top:16px; padding:12px 16px; border-radius:10px; font-size:1rem; font-weight:bold; text-align:center; }
    .feedback.correct { background:rgba(0,200,100,0.15); color:#00ff80; }
    .feedback.wrong { background:rgba(255,50,50,0.15); color:#ff8080; }
    .progress-bar { width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin-bottom:20px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#ffd700,#ffaa00); border-radius:3px; transition:width 0.4s ease; }
    #scoreboard h2 { color:#ffd700; text-align:center; margin-bottom:16px; font-size:1.4rem; }
    .score-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-radius:8px; margin-bottom:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,215,0,0.15); transition:background 0.3s; }
    .score-row.me { background:rgba(255,215,0,0.1); border-color:rgba(255,215,0,0.4); }
    .score-row .rank { color:#ffd700; font-weight:bold; min-width:30px; }
    .score-row .player-name { flex:1; padding:0 10px; }
    .score-row .player-score { color:#ffd700; font-weight:bold; }
    .hidden { display:none !important; }
    #results-section .big-score { text-align:center; font-size:3rem; color:#ffd700; margin:16px 0; text-shadow:0 0 20px rgba(255,215,0,0.5); }
    #results-section p { text-align:center; color:#aaaadd; font-size:1.1rem; }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <h1>&#10052; Winter Solstice Quiz &#10052;</h1>
  <p class="subtitle">The longest night of the year &mdash; how much do you know?</p>
  <div class="card" id="join-section">
    <input type="text" id="player-name" placeholder="Enter your name to begin..." maxlength="30" />
    <button id="join-btn" onclick="joinQuiz()">Join the Quiz &#10024;</button>
  </div>
  <div class="card hidden" id="quiz-section">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-number" id="question-number"></div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback hidden" id="feedback"></div>
    <button class="hidden" id="next-btn" onclick="nextQuestion()" style="margin-top:20px;">Next Question &rarr;</button>
  </div>
  <div class="card hidden" id="results-section">
    <h2 style="color:#ffd700;text-align:center;">Quiz Complete! &#127775;</h2>
    <div class="big-score" id="final-score"></div>
    <p id="final-message"></p>
  </div>
  <div class="card" id="scoreboard">
    <h2>&#127942; Live Scoreboard</h2>
    <div id="scores-list"><p style="color:#aaaadd;text-align:center;">No players yet...</p></div>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://poopsjyrecurnfuulgzu.supabase.co';
  const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const questions = [
    { q: "In the Northern Hemisphere, the Winter Solstice is the shortest day of the year. When does it typically occur?", options: ["December 21-22","December 31","January 1","November 30"], answer: 0 },
    { q: "What does 'solstice' mean in Latin?", options: ["Cold sun","Sun stands still","Night star","Frozen sky"], answer: 1 },
    { q: "Which ancient monument was built to align with the Winter Solstice sunrise?", options: ["The Colosseum","Machu Picchu","Stonehenge","The Pyramids of Giza"], answer: 2 },
    { q: "During the Winter Solstice, the sun reaches its most southerly position at the:", options: ["Equator","Tropic of Cancer","Arctic Circle","Tropic of Capricorn"], answer: 3 },
    { q: "What is the name of the Winter Solstice festival celebrated in ancient Rome?", options: ["Lupercalia","Saturnalia","Floralia","Lemuria"], answer: 1 },
    { q: "In the Southern Hemisphere, the Winter Solstice occurs in which month?", options: ["December","March","June","September"], answer: 2 },
    { q: "The Iranian festival of Yalda Night celebrates the Winter Solstice. What is traditionally eaten?", options: ["Hot soup and bread","Pomegranates and watermelon","Roasted nuts only","Date cake"], answer: 1 },
    { q: "Approximately how long is the longest night during the Winter Solstice at mid-latitudes?", options: ["10 hours","13 hours","15-16 hours","20 hours"], answer: 2 },
    { q: "Which planet has a Winter Solstice where one pole experiences 21 Earth-years of darkness?", options: ["Saturn","Jupiter","Neptune","Uranus"], answer: 3 },
    { q: "The Norse celebration of the Winter Solstice is called:", options: ["Beltane","Samhain","Yule","Ostara"], answer: 2 }
  ];

  let currentQuestion = 0, score = 0, playerId = null, playerName = '', answered = false;

  (function createStars() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2.5 + 0.5;
      s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;animation-delay:'+(Math.random()*3)+'s;animation-duration:'+(2+Math.random()*3)+'s;';
      c.appendChild(s);
    }
  })();

  async function joinQuiz() {
    const inp = document.getElementById('player-name');
    const name = inp.value.trim();
    if (!name) { inp.focus(); inp.style.borderColor='#ff3232'; return; }
    document.getElementById('join-btn').disabled = true;
    const { data, error } = await sb.from('players').insert([{ name, score: 0 }]).select().single();
    if (error) { console.error(error); document.getElementById('join-btn').disabled=false; alert('Could not join. Please try again.'); return; }
    playerId = data.id; playerName = name;
    document.getElementById('join-section').classList.add('hidden');
    document.getElementById('quiz-section').classList.remove('hidden');
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = questions[currentQuestion];
    document.getElementById('question-number').textContent = 'Question '+(currentQuestion+1)+' of '+questions.length;
    document.getElementById('question-text').textContent = q.q;
    document.getElementById('progress-fill').style.width = ((currentQuestion/questions.length)*100)+'%';
    const opts = document.getElementById('options');
    opts.innerHTML = '';
    q.options.forEach((opt,i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => selectAnswer(i, btn);
      opts.appendChild(btn);
    });
    document.getElementById('feedback').classList.add('hidden');
    document.getElementById('next-btn').classList.add('hidden');
  }

  async function selectAnswer(index, btn) {
    if (answered) return;
    answered = true;
    const q = questions[currentQuestion];
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(b => b.disabled = true);
    const fb = document.getElementById('feedback');
    fb.classList.remove('hidden');
    if (index === q.answer) {
      score++;
      btn.classList.add('correct');
      fb.textContent = 'Correct!';
      fb.className = 'feedback correct';
    } else {
      btn.classList.add('wrong');
      allBtns[q.answer].classList.add('correct');
      fb.textContent = 'Not quite - the correct answer is highlighted.';
      fb.className = 'feedback wrong';
    }
    if (playerId) await sb.from('players').update({ score }).eq('id', playerId);
    document.getElementById('next-btn').classList.remove('hidden');
  }

  function nextQuestion() {
    currentQuestion++;
    if (currentQuestion >= questions.length) showResults();
    else showQuestion();
  }

  function showResults() {
    document.getElementById('quiz-section').classList.add('hidden');
    document.getElementById('results-section').classList.remove('hidden');
    document.getElementById('final-score').textContent = score+' / '+questions.length;
    const pct = Math.round((score/questions.length)*100);
    let msg = pct===100 ? 'Perfect score! You are a true Winter Solstice sage!' : pct>=70 ? 'Great job! The stars shine for you tonight.' : pct>=40 ? 'Not bad! The solstice still has mysteries to share.' : 'Keep exploring the wonders of the solstice!';
    document.getElementById('final-message').textContent = msg;
    document.getElementById('progress-fill').style.width = '100%';
  }

  async function loadScoreboard() {
    const { data } = await sb.from('players').select('id,name,score').order('score',{ascending:false}).limit(20);
    const list = document.getElementById('scores-list');
    if (!data || !data.length) { list.innerHTML = '<p style="color:#aaaadd;text-align:center;">No players yet...</p>'; return; }
    list.innerHTML = data.map((p,i) => '<div class="score-row '+(p.id===playerId?'me':'')+'"><span class="rank">#'+(i+1)+'</span><span class="player-name">'+p.name+(p.id===playerId?' (you)':'')+'</span><span class="player-score">'+p.score+' pts</span></div>').join('');
  }

  sb.channel('players-changes').on('postgres_changes',{event:'*',schema:'public',table:'players'},()=>loadScoreboard()).subscribe();
  loadScoreboard();
  setInterval(loadScoreboard, 10000);
  document.getElementById('player-name').addEventListener('keydown', e => { if(e.key==='Enter') joinQuiz(); });
</script>
</body>
</html>
